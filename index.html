        :root {
            --brand-blue: #1e60ff; 
            --brand-blue-glow: rgba(30, 96, 255, 0.5);
            --brand-dark: #05070a;
            --brand-card: #0f121a;
        }

        body {
            background-color: var(--brand-dark);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .font-orbitron { font-family: 'Orbitron', sans-serif; }

        .bg-mesh {
            background-image:

                radial-gradient(at 100% 100%, rgba(30, 96, 255, 0.1) 0px, transparent 50%);
        }

        .glass-card {
            background: var(--brand-card);
            border: 1px solid rgba(30, 96, 255, 0.15);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .glass-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: var(--brand-blue);
            box-shadow: 0 15px 35px -10px var(--brand-blue-glow);
        }

        .gradient-text {
            background: linear-gradient(135deg, #ffffff 0%, var(--brand-blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-blur {
            backdrop-filter: blur(15px);
            background: rgba(5, 7, 10, 0.85);
        }

        .category-pill {
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .category-pill.active {
            background: var(--brand-blue);
            color: white;
            box-shadow: 0 0 15px var(--brand-blue-glow);
            border-color: transparent;
        }

        .btn-buy {
            background: var(--brand-blue);
            box-shadow: 0 4px 15px var(--brand-blue-glow);
            transition: all 0.3s;
        }

        .btn-buy:hover {
            filter: brightness(1.2);
            transform: scale(1.05);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        .logo-glow {
            filter: drop-shadow(0 0 8px var(--brand-blue-glow));
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--brand-dark); }
        ::-webkit-scrollbar-thumb { background: var(--brand-blue); border-radius: 10px; }

        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* Estilo para Galería Automática de diferentes tamaños */
        .masonry-grid {
            column-count: 1;
            column-gap: 1rem;
        }
        @media (min-width: 640px) { .masonry-grid { column-count: 2; } }
        @media (min-width: 1024px) { .masonry-grid { column-count: 3; } }
        @media (min-width: 1280px) { .masonry-grid { column-count: 4; } }

        .masonry-item {
            display: inline-block;
            width: 100%;
            margin-bottom: 1rem;
            break-inside: avoid;
        }
    </style>

        function toggleReferences() {
            const refSection = document.getElementById('referencesSection');
            const hero = document.getElementById('heroSection');
            const grid = document.getElementById('productGrid');
            const title = document.getElementById('mainTitle');

            if (refSection.classList.contains('hidden')) {
                refSection.classList.remove('hidden');
                hero.classList.add('hidden');
                grid.classList.add('hidden');
                title.innerHTML = 'NEXUS <span class="gradient-text uppercase">Referencias</span>';
                document.getElementById('refBtn').classList.add('active');
            } else {
                refSection.classList.add('hidden');
                hero.classList.remove('hidden');
                grid.classList.remove('hidden');
                title.innerHTML = 'NEXUS <span class="gradient-text">CATÁLOGO</span>';
                document.getElementById('refBtn').classList.remove('active');
            }
        }

            document.getElementById('referencesSection').classList.add('hidden');
            document.getElementById('heroSection').classList.remove('hidden');
            document.getElementById('productGrid').classList.remove('hidden');
            document.getElementById('mainTitle').innerHTML = 'NEXUS <span class="gradient-text">CATÁLOGO</span>';

            document.querySelectorAll('.category-pill').forEach(b => {
                b.classList.remove('active');
                b.classList.add('bg-white/5');
            });
            btn.classList.add('active');
            btn.classList.remove('bg-white/5');
            renderProducts(category);
        }

        function redirectToWhatsApp(productName, price) {
            const num = WHATSAPP_NUMBERS[0];
            const text = `¡Hola NexusPreds! 👋 Quiero comprar: ${productName} por ${price}. ¿Qué sigue?`;
            window.open(`https://wa.me/${num}?text=${encodeURIComponent(text)}`, '_blank');
        }

        function contactSupport() {
            const num = WHATSAPP_NUMBERS[0];
            window.open(`https://wa.me/${num}?text=Soporte+Nexus`, '_blank');
        }

        function renderProducts(category = 'all') {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '';
            const filtered = category === 'all' ? products : products.filter(p => p.cat === category);

            filtered.forEach((p, i) => {
                const card = document.createElement('div');
                card.className = 'glass-card rounded-2xl p-5 flex flex-col h-full animate-fade-in';
                card.style.animationDelay = `${i * 0.03}s`;
                
                const renewableTag = p.renewable 
                    ? '<span class="text-[8px] text-green-400 font-bold border border-green-400/30 px-1.5 py-0.5 rounded bg-green-400/5">RENOVABLE</span>'
                    : '<span class="text-[8px] text-gray-500 font-bold border border-white/5 px-1.5 py-0.5 rounded">CUENTA NUEVA</span>';

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-6">
                        <div class="w-12 h-12 rounded-xl flex items-center justify-center text-2xl" style="background: ${p.color}20; color: ${p.color}">
                            <i class="${p.icon}"></i>
                        </div>
                        <div class="text-right">
                            <span class="text-[9px] font-bold px-2 py-1 rounded bg-white/5 text-gray-400 border border-white/5 uppercase italic tracking-tighter">
                                ${p.type}
                            </span>
                            <div class="mt-1">${renewableTag}</div>
                        </div>
                    </div>
                    <h3 class="text-base font-bold text-white mb-2 tracking-tight">${p.name}</h3>
                    
                    <div class="flex flex-col gap-1.5 mb-6">
                        <div class="flex items-center gap-2 text-gray-500 text-[11px]">
                            <i class="far fa-clock text-blue-500"></i>
                            <span>${p.val} de validez</span>
                        </div>
                        <div class="flex items-center gap-2 text-[11px]">
                            <i class="fas fa-truck text-blue-400"></i>
                            <span class="text-gray-400">${p.delivery}</span>
                        </div>
                        <div class="flex items-center gap-2 text-[10px]">
                            <i class="fas fa-shield-alt text-green-500"></i>
                            <span class="text-gray-400 uppercase font-bold">Garantía: <span class="text-white">${p.warranty}</span></span>
                        </div>
                    </div>

                    <div class="mt-auto pt-4 border-t border-white/5 flex items-center justify-between">
                        <div>
                            <p class="text-[9px] text-gray-500 uppercase font-bold tracking-tighter mb-1">Inversión</p>
                            <p class="text-xl font-orbitron font-bold text-white tracking-tighter">$${p.price}</p>
                        </div>
                        <button onclick="redirectToWhatsApp('${p.name}', '$${p.price}')" class="btn-buy p-2.5 rounded-xl text-white">
                            <i class="fab fa-whatsapp text-lg"></i>
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        window.onload = () => renderProducts();
    </script>
</body>
</html>
